name: Build and Deploy WasiKV

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    name: Build WebAssembly Module
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust and target
        run: |
          rustup target add wasm32-wasi
          cargo build --target wasm32-wasi --release

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v3
        with:
          name: wasikv
          path: target/wasm32-wasi/release/wasikv.wasm

  docker:
    name: Build and Push Docker Image
    needs: build
    runs-on: ubuntu-latest
    permissions:
      packages: write
      contents: read
    steps:
      - uses: actions/checkout@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/wasikv:latest
          docker build -t $IMAGE_NAME .
          docker push $IMAGE_NAME

  deploy:
    name: Deploy to Kind and Test
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up KinD cluster
        uses: helm/kind-action@v1.8.0

      - name: Load image into Kind
        run: |
          IMAGE_NAME=ghcr.io/${{ github.repository_owner }}/wasikv:latest
          docker pull $IMAGE_NAME
          kind load docker-image $IMAGE_NAME

      - name: Deploy to Kubernetes
        run: |
          kubectl apply -f k8s/deployment.yaml
          kubectl apply -f k8s/service.yaml

      - name: Wait for pods to be ready
        run: |
          kubectl wait --for=condition=available deployment/wasikv --timeout=120s

      - name: Port-forward and test API
        run: |
          kubectl port-forward svc/wasikv 8080:80 &
          sleep 5
          curl "http://localhost:8080/put?foo=bar"
          curl "http://localhost:8080/get?key=foo"
